/* CRITICAL CSS FOR LCP & CLS (extracted from style.css) */
:root {
  --p-white: #ffffff;
  --p-text-dim: rgba(255, 255, 255, 0.7);
  --p-font-stack: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  --body-font: var(--p-font-stack);
  --p-green-main: #0c5f12; /* Only if used in header text directly */
  --p-green-alpine: #052608; /* Only if used in header text directly */
  --text-main: #333333; /* For global styles */
  --bg-main: #ffffff; /* For global styles */
  --size-h1: 3.5rem; /* for header h1 */
  --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* for header h1 */
}

/* DARK MODE OVERRIDES (Critical if header changes in dark mode) */
@media (prefers-color-scheme: dark) {
  :root {
    --bg-main: #121212;
    --text-main: #e0e0e0;
    --p-green-alpine: #00ffcc; /* If h1/p use this in dark mode */
  }
}

/* GLOBAL RESET */
* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  background-color: var(--bg-main);
  color: var(--text-main);
}

html, body {
  overflow-x: clip;
  width: 100%;
  position: relative;
}

body {
  margin: 0;
  padding: 0;
  font-family: var(--body-font);
  overflow-x: clip;
}

/* HERO SECTION - Directly impacting LCP */
header {
  padding-top: 100px;
  background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.3)),
                    url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2000');
  background-size: cover;
  background-position: center;
  min-height: 85vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
}

header h1 {
  color: var(--p-white) !important;
  font-size: 3.5rem;
  line-height: 1.2; /* Added for CLS fix */
  text-shadow: 2px 2px 15px rgba(0,0,0,0.6);
  text-transform: uppercase;
  letter-spacing: 3px;
  margin: 0;
}

header p {
  color: var(--p-white) !important;
  font-size: 1.5rem;
  line-height: 1.6; /* Added for CLS fix */
  margin-top: 10px;
}

.header-logo {
  display: block;
  width: 300px;
  max-width: 80%;
  height: auto;
  margin: 0 auto 20px;
  filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5));
}

/* Add any other critical CSS for the navigation if it's above the fold */
/* For example, if .main-nav is visible immediately */
.main-nav {
    background: linear-gradient(180deg, rgba(5, 38, 8, 0.85) 0%, rgba(12, 95, 18, 0.85) 100%) !important;
    -webkit-backdrop-filter: blur(18px) saturate(110%) !important; /* using hardcoded value for --nav-blur for critical CSS */
    backdrop-filter: blur(18px) saturate(110%) !important; /* using hardcoded value for --nav-blur for critical CSS */
    padding: 12px 0 !important; /* using hardcoded value for --nav-padding for critical CSS */
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    z-index: 9999 !important;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important; /* using hardcoded value for --nav-border for critical CSS */
    transition: all 0.3s ease !important;
}
/* ... include other necessary nav styles, e.g., .main-nav .nav-container, etc. */
.main-nav .nav-container {
    max-width: 1200px; /* using hardcoded value for --container-width */
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
}
.main-nav .logo-text {
    color: var(--p-white) !important; /* using hardcoded value for --text-nav */
    font-weight: 900 !important;
    font-size: 1.2rem !important; /* using hardcoded value for --size-logo */
    text-decoration: none !important;
    text-transform: uppercase !important;
    letter-spacing: 2px !important;
    font-family: var(--font-main);
}
.logo-group {
    display: flex;
    align-items: center;
    text-decoration: none;
    gap: 10px;
}
.nav-icon {
    height: 40px;
    width: auto;
    border-radius: 4px;
}
.logo-text {
    font-weight: bold;
    color: var(--p-white, #ffffff);
    font-size: 1.2rem;
}
.main-nav ul {
    display: flex !important;
    gap: 30px !important;
    list-style: none !important;
    margin: 0 !important;
    padding: 0 !important;
    align-items: center !important;
}
.main-nav ul li a {
    color: var(--p-white) !important; /* using hardcoded value for --text-nav */
    text-decoration: none !important;
    font-weight: 700 !important;
    font-size: 0.9rem !important; /* using hardcoded value for --size-nav */
    text-transform: uppercase !important;
    letter-spacing: 1px !important;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3) !important;
    transition: color 0.3s ease !important;
}
/* Mobile menu styles also need to be critical if it's the default view */
@media (max-width: 768px) {
    .menu-toggle {
        display: block;
    }
    .nav-menu {
        position: fixed;
        top: 85px; /* assuming --nav-height is 85px */
        right: 0;
        width: 100%;
        height: auto;
        background: rgba(12, 95, 18, 0.8); /* using hardcoded value for --nav-bg and --nav-opacity */
        -webkit-backdrop-filter: blur(18px);
        backdrop-filter: blur(18px);
        flex-direction: column !important;
        padding: 40px 0 !important;
        gap: 30px !important;
        transform: translateX(100%);
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1); /* using hardcoded value for --nav-border */
        z-index: 10000;
    }
    .nav-menu.active {
        transform: translateX(0);
    }
    .nav-menu li a {
        font-size: 1.2rem !important;
        display: block;
        width: 100%;
        text-align: center;
    }
    .main-nav .nav-container {
        width: 100% !important;
        max-width: 100vw !important;
        padding: 0 20px !important;
        overflow: hidden;
    }
}

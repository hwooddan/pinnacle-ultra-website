/* CRITICAL CSS FOR LCP & CLS (extracted from style.css) */
:root {
  --p-white: #ffffff;
  --p-text-dim: rgba(255, 255, 255, 0.7);
  --p-font-stack: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  --body-font: var(--p-font-stack);
  --p-green-main: #0c5f12; /* Only if used in header text directly */
  --p-green-alpine: #052608; /* Only if used in header text directly */
  --text-main: #333333; /* For global styles */
  --bg-main: #ffffff; /* For global styles */
  --size-h1: 3.5rem; /* for header h1 */
  --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* for header h1 */
}

/* DARK MODE OVERRIDES (Critical if header changes in dark mode) */
@media (prefers-color-scheme: dark) {
  :root {
    --bg-main: #121212;
    --text-main: #e0e0e0;
    --p-green-alpine: #00ffcc; /* If h1/p use this in dark mode */
  }
}

/* GLOBAL RESET */
* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  background-color: var(--bg-main);
  color: var(--text-main);
}

html, body {
  overflow-x: clip;
  width: 100%;
  position: relative;
}

body {
  margin: 0;
  padding: 0;
  font-family: var(--body-font);
  overflow-x: clip;
}

/* HERO SECTION - Directly impacting LCP */
header {
  padding-top: 100px;
  background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.3)),
                    url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2000');
  background-size: cover;
  background-position: center;
  min-height: 85vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
}

header h1 {
  color: var(--p-white) !important;
  font-size: 3.5rem;
  line-height: 1.2; /* Added for CLS fix */
  text-shadow: 2px 2px 15px rgba(0,0,0,0.6);
  text-transform: uppercase;
  letter-spacing: 3px;
  margin: 0;
}

header p {
  color: var(--p-white) !important;
  font-size: 1.5rem;
  line-height: 1.6; /* Added for CLS fix */
  margin-top: 10px;
}

.header-logo {
  display: block;
  width: 300px;
  max-width: 80%;
  height: auto;
  margin: 0 auto 20px;
  filter: drop_shadow(0px 4px 8px rgba(0,0,0,0.5));
}

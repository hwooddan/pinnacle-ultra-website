<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinnacle Ultra | Expert Coaching</title>
    <style>
        /* CSS STYLES */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #fff;
            background-color: #000;
            overflow: hidden;
        }

        /* Background Image with Dark Overlay */
        .hero-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: 8px;
            margin: 0;
            text-transform: uppercase;
        }

        .accent-line {
            width: 80px;
            height: 4px;
            background: #ff4d4d; /* Athletic Red */
            margin: 20px auto;
        }

        p {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .status-badge {
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 20px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-radius: 50px;
        }

    </style>
</head>
<body>

    <div class="hero-bg">
        <div class="container">
            <div class="status-badge">Coming Soon</div>
            <h1>PINNACLE ULTRA</h1>
            <div class="accent-line"></div>
            <p>Expert Coaching for the Long Run</p>
                   </div>
    </div>

</body>
</html>
